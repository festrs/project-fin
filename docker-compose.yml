services:
  backend:
    build: ./backend
    container_name: project-fin-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=sqlite:///./data/project_fin.db
      - CORS_ORIGIN=http://localhost:3000
      - CORS_EXTRA_ORIGINS=http://localhost:5173,https://*.trycloudflare.com
    volumes:
      - db-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: project-fin-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: project-fin-tunnel
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    command: tunnel --url http://backend:8000 --no-autoupdate
    # Quick Tunnel — gives you a free *.trycloudflare.com URL
    # Check logs for the URL: docker compose logs cloudflared

volumes:
  db-data:
