app = "grove-invest-api"
primary_region = "gru"

[build]

[env]
  DATABASE_URL = "sqlite:////data/project_fin.db"
  CORS_ORIGIN = "https://grove-invest-api.fly.dev"
  CORS_EXTRA_ORIGINS = "http://localhost:5173,http://localhost:3000"
  ENABLE_SCHEDULER = "true"
  ENABLE_DIVIDEND_SCRAPER = "true"
  ENABLE_SPLIT_CHECKER = "true"
  ENABLE_SNAPSHOT_SCHEDULER = "true"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  interval = "60s"
  timeout = "15s"
  grace_period = "120s"
  method = "GET"
  path = "/api/health"

[mounts]
  source = "data"
  destination = "/data"
